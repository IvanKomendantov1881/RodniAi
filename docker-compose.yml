name: learning_bot

services:
  db:
    image: postgres:16
    container_name: learning_bot_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: learning_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: learning_bot_rmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  go_bot:
    build: .
    container_name: learning_bot_go
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: learning_bot
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
    volumes:
      - ./storage:/app/storage

  python_worker:
    build: ./python_worker
    container_name: learning_bot_python
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started
    environment:
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: learning_bot
      FREELLM_BASE_URL: ${FREELLM_BASE_URL}
      FREELLM_API_KEY: ${FREELLM_API_KEY}
      # OPENAI_MODEL: ${OPENAI_MODEL}
    volumes:
    - ./storage:/app/storage
  freellm:
    image: node:20-alpine
    container_name: learning_bot_freellm
    working_dir: /app
    command: sh -c "npm install && npm run build && node server/dist/index.js"
    environment:
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DEV_MODE: ${DEV_MODE}
    ports:
      - "3001:3001"
      - "5173:5173"
    volumes:
      - ./freellm:/app
    restart: always
volumes:
  postgres_data:
  rabbitmq_data: